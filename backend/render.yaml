services:
  - type: web
    name: jobhub-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_NAME
        value: jobhub
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
